<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>MD5 PRO — DUK</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#02030a,#040a1f,#000000,#040a1f);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
color:white;
text-align:center;
overflow:hidden;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* FIREWORK */
#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* HEADER */
.header{
padding:18px;
font-size:24px;
font-weight:bold;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
color:#00f7ff;
text-shadow:0 0 15px #00f7ff,0 0 40px #00f7ff;
}

/* MODE */
.modeBox{
margin-top:10px;
padding:10px 20px;
border-radius:14px;
font-size:15px;
font-weight:bold;
letter-spacing:1px;
display:inline-block;
min-width:160px;
transition:0.3s;
}
.mode-vip{
color:#ffd700;
background:rgba(255,215,0,0.08);
box-shadow:0 0 12px #ffd700,0 0 30px rgba(255,215,0,0.6),inset 0 0 12px #ffd700;
text-shadow:0 0 10px #ffd700,0 0 20px #ffd700;
}
.mode-basic{
color:#00f7ff;
background:rgba(0,247,255,0.08);
box-shadow:0 0 12px #00f7ff,0 0 30px rgba(0,247,255,0.6),inset 0 0 12px #00f7ff;
text-shadow:0 0 10px #00f7ff,0 0 20px #00f7ff;
}

/* BOX */
.box{
margin:12px;
padding:15px;
border-radius:16px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
box-shadow:0 0 25px rgba(0,255,255,0.35);
position:relative;
z-index:2;
}

/* INPUT */
input{
width:90%;
padding:12px;
border:none;
border-radius:10px;
background:#000;
color:#00f7ff;
text-align:center;
font-size:16px;
box-shadow:0 0 10px #00f7ff inset;
}

/* BUTTON */
button{
margin-top:10px;
padding:12px 18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
.mainBtn{
background:#001f2b;
color:#00f7ff;
box-shadow:0 0 10px #00f7ff;
}
.vipBtn{
background:#2b2100;
color:#ffd700;
box-shadow:0 0 12px #ffd700;
}
.ok{
background:#00c853;
color:white;
}
.fail{
background:#ff1744;
color:white;
}

.big{
font-size:50px;
font-weight:bold;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

.bar{
height:10px;
background:#222;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}
.fill{
height:100%;
background:linear-gradient(90deg,#ff3d00,#00f7ff);
width:50%;
transition:0.5s;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 8px;
font-size:14px;
gap:8px;
flex-wrap:wrap;
}

.history{
font-size:13px;
text-align:left;
max-height:160px;
overflow:auto;
}

/* RADAR */
.radarBox{
display:none;
margin-top:10px;
}
.radar{
width:120px;
height:120px;
border-radius:50%;
margin:10px auto;
position:relative;
background:radial-gradient(circle, rgba(0,255,255,0.15) 0%, rgba(0,0,0,0.8) 70%);
box-shadow:0 0 20px #00f7ff inset, 0 0 25px #00f7ff;
overflow:hidden;
}
.radar::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:conic-gradient(rgba(0,255,255,0.6) 0deg, transparent 60deg);
animation:scan 1s linear infinite;
}
@keyframes scan{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
.scanText{
color:#00f7ff;
font-size:13px;
text-shadow:0 0 10px #00f7ff;
}
</style>
</head>

<body>
<canvas id="fireworks"></canvas>

<div class="header">MD5 PRO — DUK</div>

<!-- MODE -->
<div class="box">
<button class="vipBtn" onclick="setMode('vip')">VIP</button>
<button class="mainBtn" onclick="setMode('basic')">BASIC</button>
<div id="modeText" class="modeBox mode-vip">👑 VIP MODE</div>
</div>

<!-- INPUT -->
<div class="box">
<input id="md5" placeholder="Nhập MD5 32 ký tự">
<br>
<button class="mainBtn" id="analyzeBtn" onclick="analyze()">PHÂN TÍCH</button>

<div class="radarBox" id="radarBox">
<div class="radar"></div>
<div class="scanText">AI SCAN: <span id="scanPercent">0</span>%</div>
<div class="bar"><div class="fill" id="scanBar" style="width:0%"></div></div>
</div>
</div>

<!-- RESULT -->
<div class="box">
<div>DỰ ĐOÁN</div>

<div class="big" id="result">--</div>

<div class="bar">
<div class="fill" id="bar"></div>
</div>

<div class="row">
<span>TÀI: <span id="tai">50</span>%</span>
<span>XỈU: <span id="xiu">50</span>%</span>
</div>

<div class="row">
<span>THUẬT TOÁN: <span id="conf">0%</span></span>
<span>MAY MẮN: <span id="lucky">0</span></span>
<span>THẮNG: <span id="winrate">50%</span></span>
</div>

<button class="ok" id="btnOk" onclick="mark(true)" disabled>✓ ĐÚNG</button>
<button class="fail" id="btnFail" onclick="mark(false)" disabled>✗ SAI</button>

<div id="stats">ĐÚNG: 0 | SAI: 0</div>
</div>

<!-- HISTORY VIP -->
<div class="box">
<div>LỊCH SỬ PHÂN TÍCH (20)</div>
<div class="history" id="history"></div>
</div>

<script>
// =========================
// BIẾN TOÀN CỤC
// =========================
let correct = 0;
let wrong = 0;
let win_count = 0;
let total_count = 0;

let history = [];

let mode = "vip";
let lastMD5 = "";

// DÒNG LỊCH SỬ HIỆN TẠI
let currentHistoryIndex = -1;


// =========================
// MODE
// =========================
function setMode(m){

mode = m;

let box = document.getElementById("modeText");

if(m === "vip"){

box.className = "modeBox mode-vip";
box.innerText = "👑 VIP MODE";

}else{

box.className = "modeBox mode-basic";
box.innerText = "⚡ BASIC MODE";
}
}


// =========================
// ANALYZE
// =========================
function analyze(){

let md5 = document.getElementById("md5").value.trim().toLowerCase();

if(md5.length != 32){

alert("MD5 phải đủ 32 ký tự");
return;
}

lastMD5 = md5;

document.getElementById("analyzeBtn").disabled = true;
document.getElementById("radarBox").style.display = "block";


// ===== AI SCAN =====
let percentScan = 0;

let scanBar = document.getElementById("scanBar");
let scanText = document.getElementById("scanPercent");

let scanInterval = setInterval(()=>{

percentScan += 5;

scanBar.style.width = percentScan + "%";
scanText.innerText = percentScan;

if(percentScan >= 100){

clearInterval(scanInterval);
}

},60);


// ===== MAIN RESULT =====
setTimeout(()=>{

document.getElementById("radarBox").style.display = "none";

let result;
let confidence;


// ===== VIP / BASIC =====
if(mode === "vip"){

let last = parseInt(md5.slice(-1),16);

result = last % 2 == 0 ? "TÀI" : "XỈU";

confidence = Math.floor(Math.random()*10) + 85;

}else{

result = Math.random() < 0.5 ? "TÀI" : "XỈU";

confidence = Math.floor(Math.random()*20) + 50;
}


// ===== PERCENT =====
let hexValue = parseInt(md5.substring(28,32),16);

let base = (mode === "vip") ? 70 : 55;
let range = (mode === "vip") ? 21 : 31;

let tai_percent = base + (hexValue % range);

if(tai_percent > 95){
tai_percent = 95;
}

let xiu_percent = 100 - tai_percent;


// ===== LUCKY =====
let lucky = parseInt(md5.substring(0,2),16) % 100;


// ===== WINRATE =====
let winrate = total_count > 0
? Math.floor((win_count/total_count)*100)
: 50;


// ===== UI =====
document.getElementById("result").innerText = result;

document.getElementById("tai").innerText = tai_percent;

document.getElementById("xiu").innerText = xiu_percent;

document.getElementById("bar").style.width =
tai_percent + "%";

document.getElementById("conf").innerText =
confidence + "%";

document.getElementById("lucky").innerText =
lucky;

document.getElementById("winrate").innerText =
winrate + "%";


// ===== BUTTON =====
document.getElementById("btnOk").disabled = false;
document.getElementById("btnFail").disabled = false;


// =========================
// HISTORY
// =========================
let historyLine =
"[ " + mode.toUpperCase() + " ] " +
result +
" | " +
md5.substring(0,6) +
" | AI:" + confidence +
"% | L:" + lucky;

history.unshift(historyLine);

// LUÔN LÀ DÒNG MỚI NHẤT
currentHistoryIndex = 0;

if(history.length > 20){

history.pop();
}

document.getElementById("history").innerHTML =
history.join("<br>");


// ===== RESET BTN =====
document.getElementById("analyzeBtn").disabled = false;

},1200);
}


// =========================
// MARK
// =========================
function mark(ok){

total_count++;

let status = "";

if(ok){

correct++;
win_count++;
status = "✓ ĐÚNG";

}else{

wrong++;
status = "✗ SAI";
}


// =========================
// UPDATE LỊCH SỬ DÒNG VỪA PHÂN TÍCH
// =========================
if(currentHistoryIndex > -1 && history[currentHistoryIndex]){

// TRÁNH GHI ĐÈ NHIỀU LẦN
if(
!history[currentHistoryIndex].includes("✓ ĐÚNG") &&
!history[currentHistoryIndex].includes("✗ SAI")
){

history[currentHistoryIndex] =
history[currentHistoryIndex] +
" | " +
status;
}
}


// ===== UPDATE HISTORY =====
document.getElementById("history").innerHTML =
history.join("<br>");


// ===== STATS =====
document.getElementById("stats").innerText =
"ĐÚNG: " + correct +
" | SAI: " + wrong;


// ===== WINRATE =====
document.getElementById("winrate").innerText =
Math.floor((win_count/total_count)*100) + "%";


// ===== DISABLE =====
document.getElementById("btnOk").disabled = true;
document.getElementById("btnFail").disabled = true;


// ===== RESET NEXT =====
document.getElementById("md5").value = "";

document.getElementById("result").innerText = "--";

document.getElementById("tai").innerText = "50";

document.getElementById("xiu").innerText = "50";

document.getElementById("conf").innerText = "0%";

document.getElementById("lucky").innerText = "0";

document.getElementById("bar").style.width = "50%";


// ===== READY NEXT =====
setTimeout(()=>{

document.getElementById("md5").focus();

},300);
}
</script>
